apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gitops-app-aicha-sy
  namespace: "aicha-sy"
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: "aicha-sy"
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - "aicha-sy"
