# A utiliser avec le chart communautaire prometheus-community/kube-prometheus-stack
# helm install monitoring prometheus-community/kube-prometheus-stack -f prometheus-values.yaml -n monitoring --create-namespace

grafana:
  enabled: true
  adminPassword: "changeme-aicha"
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "custom"
          orgId: 1
          folder: "Aicha Sy - GitOps"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/custom
  dashboardsConfigMaps:
    custom: "grafana-dashboard-aicha-sy"

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

alertmanager:
  enabled: true
