name: CI - build, test, scan, push

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "helm-chart/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest -v

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./helm-chart

      - name: Helm template (validation rendu)
        run: helm template ./helm-chart > /tmp/rendered.yaml

  build-scan-push:
    needs: [test, helm-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag and lowercase image name
        id: vars
        run: |
          echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }} \
                        -t ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:latest \
                        ./app

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:latest

      # ---- Etape GitOps : on met a jour values.yaml avec le nouveau tag ----
      # C'est CE commit que Argo CD va detecter et synchroniser automatiquement.
      - name: Update image tag in values.yaml (déclenche la sync GitOps)
        run: |
          sed -i "s/tag: .*/tag: \"${{ steps.vars.outputs.tag }}\"/" helm-chart/values.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git commit -am "ci: bump image tag to ${{ steps.vars.outputs.tag }} [skip ci]" || echo "rien a committer"
          git push
