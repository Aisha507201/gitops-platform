# =========================================================
# Fichier a personnaliser en priorite : nom, prenom, image
# =========================================================
student:
  nom: "Sy"
  prenom: "Aicha"

replicaCount: 3

image:
  repository: nginx
  tag: "alpine"
  
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  host: "aicha-sy.local"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

probes:
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

appConfig:
  title: "Application Web de Aicha Sy"
  themeColor: "mauve"
  backgroundColor: "#E6E6FA"
  primaryButtonColor: "#8A2BE2"
  textColor: "#4B0082"
