student:
  nom: "Sy"
  prenom: "Aicha"

replicaCount: 5

image:
  repository: nginx
  tag: "alpine"
  pullPolicy: IfNotPresent  # Ajoute cette ligne si elle manque

service:
  type: ClusterIP
  port: 80
  targetPort: 80

# C'EST ICI LA CORRECTION
probes:
  liveness:
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 5

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "80"
  prometheus.io/path: "/metrics"
